name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Triggers the workflow on push to main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Matching your local modern Node environment
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # 'npm ci' is cleaner and faster for automated CI pipelines

      - name: Build Application
        run: npm run build
        env:
          CI: false # Prevents TypeScript warnings from being treated as compilation errors

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build # The directory where 'npm run build' outputs production files
          branch: gh-pages # The branch the action will deploy to
